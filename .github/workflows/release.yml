name: Release

# Two ways to cut a release, both publish a built ZIP to THIS repo's Releases
# (read tokenlessly by client sites via plugin-update-checker):
#
#   1. One-click (recommended): Actions -> Release -> "Run workflow" -> pick
#      patch / minor / major. The workflow bumps the version in the plugin file,
#      commits it to main, tags it, builds the ZIP, and publishes the release.
#
#   2. Manual tag (fallback): bump the version in bono-leads-connector.php yourself,
#      then `git tag vX.Y.Z && git push origin vX.Y.Z`.
#
# The built-in GITHUB_TOKEN publishes to the current repo, so no PAT is required.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semantic version bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: bono-leads-connector
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version, commit, tag (one-click path)
        if: github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          set -euo pipefail
          CUR="$(grep -oiP '(?<=\*\s)Version:\s*\K[0-9][0-9A-Za-z.\-]*' "${PLUGIN_SLUG}.php" | head -n1)"
          IFS='.' read -r MA MI PA <<< "$CUR"
          case "${{ inputs.bump }}" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            patch) PA=$((PA + 1)) ;;
          esac
          NEW="${MA}.${MI}.${PA}"
          echo "Bumping ${CUR} -> ${NEW}"
          sed -i -E "s|^( \* Version: ).*|\1${NEW}|" "${PLUGIN_SLUG}.php"
          sed -i -E "s|(BONO_PLUGIN_VERSION', ')[0-9][0-9A-Za-z.\-]*|\1${NEW}|" "${PLUGIN_SLUG}.php"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "${PLUGIN_SLUG}.php"
          git commit -m "chore(release): v${NEW}"
          git push origin main
          git tag "v${NEW}"
          git push origin "v${NEW}"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            echo "tag=${{ steps.bump.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches plugin version (manual-tag path)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          HEADER_VERSION="$(grep -oiP '(?<=\*\s)Version:\s*\K[0-9][0-9A-Za-z.\-]*' "${PLUGIN_SLUG}.php" | head -n1)"
          CONST_VERSION="$(grep -oP "BONO_PLUGIN_VERSION',\s*'\K[0-9][0-9A-Za-z.\-]*" "${PLUGIN_SLUG}.php" | head -n1)"
          echo "tag=$TAG_VERSION header=$HEADER_VERSION const=$CONST_VERSION"
          if [ "$TAG_VERSION" != "$HEADER_VERSION" ] || [ "$TAG_VERSION" != "$CONST_VERSION" ]; then
            echo "::error::Version mismatch — tag '$TAG_VERSION', header '$HEADER_VERSION', constant '$CONST_VERSION' must all match."
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Build distributable ZIP
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tests' \
            --exclude='tests-integration' \
            --exclude='node_modules' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='.wp-env.json' \
            --exclude='phpunit.xml.dist' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpstan.neon.dist' \
            --exclude='.gitignore' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*.md' \
            ./ "build/${PLUGIN_SLUG}/"
          # Sanity: vendored deps must be present, or auto-update would ship a broken plugin.
          test -f "build/${PLUGIN_SLUG}/vendor/yahnis-elsts/plugin-update-checker/plugin-update-checker.php"
          test -f "build/${PLUGIN_SLUG}/vendor/woocommerce/action-scheduler/action-scheduler.php"
          ( cd build && zip -rq "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}" )
          ls -lh "build/${PLUGIN_SLUG}.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: build/${{ env.PLUGIN_SLUG }}.zip
          fail_on_unmatched_files: true
