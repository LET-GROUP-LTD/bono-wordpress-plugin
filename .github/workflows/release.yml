name: Release

# Builds a distributable plugin ZIP and publishes it as a GitHub Release on the
# PUBLIC distribution repo (bono-wordpress-plugin-dist). Client sites read that
# repo's Releases tokenless via plugin-update-checker. The source stays private.
#
# Trigger: push a tag like v0.4.0. The tag (minus the leading "v") must match both
# the plugin header "Version:" and the BONO_PLUGIN_VERSION constant, or the build
# fails fast — this prevents shipping a ZIP whose internal version disagrees with
# the release, which would make WordPress see an endless "update available".
#
# Requires repo secret DIST_REPO_TOKEN: a PAT (fine-grained, Contents: read+write
# on bono-wordpress-plugin-dist only). The default GITHUB_TOKEN cannot write to
# another repository.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: bono-leads-connector
      DIST_REPO: LET-GROUP-LTD/bono-wordpress-plugin-dist
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify tag matches plugin version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          HEADER_VERSION="$(grep -oiP '(?<=\*\s)Version:\s*\K[0-9][0-9A-Za-z.\-]*' "${PLUGIN_SLUG}.php" | head -n1)"
          CONST_VERSION="$(grep -oP "BONO_PLUGIN_VERSION',\s*'\K[0-9][0-9A-Za-z.\-]*" "${PLUGIN_SLUG}.php" | head -n1)"
          echo "tag=$TAG_VERSION header=$HEADER_VERSION const=$CONST_VERSION"
          if [ "$TAG_VERSION" != "$HEADER_VERSION" ] || [ "$TAG_VERSION" != "$CONST_VERSION" ]; then
            echo "::error::Version mismatch — tag '$TAG_VERSION', header '$HEADER_VERSION', constant '$CONST_VERSION' must all match."
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Build distributable ZIP
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='.gitignore' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*.md' \
            ./ "build/${PLUGIN_SLUG}/"
          # Sanity: vendored deps must be present, or auto-update would ship a broken plugin.
          test -f "build/${PLUGIN_SLUG}/vendor/yahnis-elsts/plugin-update-checker/plugin-update-checker.php"
          test -f "build/${PLUGIN_SLUG}/vendor/woocommerce/action-scheduler/action-scheduler.php"
          ( cd build && zip -rq "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}" )
          ls -lh "build/${PLUGIN_SLUG}.zip"

      - name: Publish release to distribution repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.DIST_REPO }}
          token: ${{ secrets.DIST_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: build/${{ env.PLUGIN_SLUG }}.zip
          fail_on_unmatched_files: true
